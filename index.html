<!DOCTYPE html>
<html>
<head>
  <title>Smart Receipt Saver</title>
  <style>
    body { font-family: Arial; text-align: center; padding: 10px; }
    img { width: 100px; margin: 10px; border-radius: 10px; }
    #gallery { display: flex; flex-wrap: wrap; justify-content: center; }
    .imgBox { position: relative; border:1px solid #ccc; margin:10px; padding:10px; border-radius:10px;}
    button { margin: 5px; padding: 8px; }
    input { padding: 8px; margin: 5px; width: 80%; }
    .deleteBtn {
      position: absolute;
      top: 5px;
      right: 5px;
      background: red;
      color: white;
      border: none;
    }
  </style>
</head>

<body>

<h2>📸 Smart Receipt Saver</h2>

<input type="file" id="fileInput" accept="image/*"><br>
<input type="text" id="titleInput" placeholder="Enter receipt name"><br>

<img id="preview" style="display:none; width:200px;"><br>

<button onclick="saveImage()">Save</button>

<h3>🔍 Search</h3>
<input type="text" id="searchInput" placeholder="Search receipts..." oninput="loadImages()">

<h3>Gallery</h3>
<div id="gallery"></div>

<script>
let db;

// Open DB
let request = indexedDB.open("ReceiptDB", 1);

request.onupgradeneeded = function(e) {
    db = e.target.result;
    db.createObjectStore("receipts", { autoIncrement: true });
};

request.onsuccess = function(e) {
    db = e.target.result;
    loadImages();
};

// Preview
let selectedImage = "";

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    const reader = new FileReader();

    reader.onload = function() {
        selectedImage = reader.result;
        document.getElementById('preview').src = selectedImage;
        document.getElementById('preview').style.display = "block";
    };

    reader.readAsDataURL(file);
});

// Save
function saveImage() {
    const title = document.getElementById('titleInput').value;
    if (!selectedImage || !title) {
        return alert("Add image and title");
    }

    const date = new Date().toLocaleString();

    let tx = db.transaction("receipts", "readwrite");
    let store = tx.objectStore("receipts");

    store.add({
        image: selectedImage,
        title: title,
        date: date
    });

    tx.oncomplete = function() {
        selectedImage = "";
        document.getElementById('preview').style.display = "none";
        document.getElementById('titleInput').value = "";
        loadImages();
    };
}

// Load + Search
function loadImages() {
    const gallery = document.getElementById('gallery');
    const search = document.getElementById('searchInput').value.toLowerCase();
    gallery.innerHTML = "";

    let tx = db.transaction("receipts", "readonly");
    let store = tx.objectStore("receipts");

    let request = store.openCursor();

    request.onsuccess = function(e) {
        let cursor = e.target.result;

        if (cursor) {
            let data = cursor.value;

            if (data.title.toLowerCase().includes(search)) {

                let div = document.createElement('div');
                div.className = "imgBox";

                let img = document.createElement('img');
                img.src = data.image;

                let title = document.createElement('p');
                title.innerText = data.title;

                let date = document.createElement('small');
                date.innerText = data.date;

                let btn = document.createElement('button');
                btn.innerText = "X";
                btn.className = "deleteBtn";
                btn.onclick = function() {
                    deleteImage(cursor.key);
                };

                div.appendChild(btn);
                div.appendChild(img);
                div.appendChild(title);
                div.appendChild(date);

                gallery.appendChild(div);
            }

            cursor.continue();
        }
    };
}

// Delete
function deleteImage(key) {
    let tx = db.transaction("receipts", "readwrite");
    let store = tx.objectStore("receipts");

    store.delete(key);
    tx.oncomplete = loadImages;
}
</script>

</body>
</html>
